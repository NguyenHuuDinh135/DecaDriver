name: Deploy AI Handlers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/app/services/sagemaker_handlers/**"

env:
  AWS_REGION: us-east-1
  HANDLERS_DIR: apps/api/app/services/sagemaker_handlers

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to SageMaker ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "763104351884"

      - name: Build and push FASHN image
        env:
          ECR_URL: ${{ steps.ecr.outputs.registry }}/decadriver-fashn:latest
        run: |
          docker build -f "$HANDLERS_DIR/Dockerfile.fashn" -t "$ECR_URL" "$HANDLERS_DIR"
          docker push "$ECR_URL"

      - name: Upload Qwen handler to S3
        run: |
          tar -czf /tmp/qwen.tar.gz -C $HANDLERS_DIR inference_qwen.py
          aws s3 cp /tmp/qwen.tar.gz s3://decadriver-ai-assets-864981728805/models/qwen/source.tar.gz
