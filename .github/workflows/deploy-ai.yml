name: Deploy AI Handlers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/app/services/sagemaker_handlers/**"

env:
  AWS_REGION: us-west-2
  HANDLERS_DIR: apps/api/app/services/sagemaker_handlers

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to SageMaker ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "763104351884"

      - name: Build and push FASHN image
        env:
          ECR_URL: ${{ secrets.ECR_FASHN_IMAGE_URI }}
        run: |
          docker build -f "$HANDLERS_DIR/Dockerfile.fashn" -t "$ECR_URL" "$HANDLERS_DIR"
          docker push "$ECR_URL"

      - name: Upload Qwen handler to S3
        run: |
          tar -czf /tmp/qwen.tar.gz -C $HANDLERS_DIR inference_qwen.py
          aws s3 cp /tmp/qwen.tar.gz s3://${{ secrets.AI_S3_BUCKET }}/models/qwen/source.tar.gz
