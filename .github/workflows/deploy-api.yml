name: Deploy API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/**"

env:
  AWS_REGION: us-west-2

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.26"

      - run: uv sync
        working-directory: apps/api

      - name: Build Email Templates
        working-directory: apps/api/app/email-templates
        run: |
          mkdir -p build
          for f in src/*.mjml; do
            npx mjml "$f" -o "build/$(basename "$f" .mjml).html"
          done

      - run: uv run bash scripts/prestart.sh
        working-directory: apps/api
        env:
          PROJECT_NAME: "Test API"
          POSTGRES_SERVER: "localhost"
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "testpassword"
          POSTGRES_DB: "app"
          FIRST_SUPERUSER: "admin@example.com"
          FIRST_SUPERUSER_PASSWORD: "testpassword"

      - run: uv run pytest tests/ -x -q
        working-directory: apps/api
        env:
          PROJECT_NAME: "Test API"
          POSTGRES_SERVER: "localhost"
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "testpassword"
          POSTGRES_DB: "app"
          FIRST_SUPERUSER: "admin@example.com"
          FIRST_SUPERUSER_PASSWORD: "testpassword"
          SMTP_HOST: "smtp.example.com"
          EMAILS_FROM_EMAIL: "info@example.com"

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_URL: ${{ secrets.ECR_REPOSITORY_URL }}
          SHA: ${{ github.sha }}
        run: |
          docker build -t $ECR_URL:$SHA -t $ECR_URL:latest apps/api/
          docker push $ECR_URL:$SHA
          docker push $ECR_URL:latest

      - name: Deploy to ECS
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
          SERVICE: ${{ secrets.ECS_SERVICE_NAME }}
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE \
            --region ${{ env.AWS_REGION }}
