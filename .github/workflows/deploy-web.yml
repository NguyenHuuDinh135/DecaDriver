name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"

env:
  AWS_REGION: us-west-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API URL from SSM
        id: api_url
        run: |
          ALB=$(aws ssm get-parameter --name /decadriver/prod/alb_dns_name --region ${{ env.AWS_REGION }} --query Parameter.Value --output text 2>/dev/null || echo "pending-deploy")
          echo "url=http://$ALB/api/v1" >> $GITHUB_OUTPUT

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_URL: ${{ steps.ecr.outputs.registry }}/decadriver-web
          SHA: ${{ github.sha }}
          NEXT_PUBLIC_API_URL: ${{ steps.api_url.outputs.url }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL \
            -t $ECR_URL:$SHA \
            -t $ECR_URL:latest \
            -f apps/web/Dockerfile .
          docker push $ECR_URL:$SHA
          docker push $ECR_URL:latest

      - name: Deploy to ECS
        env:
          CLUSTER: decadriver
          SERVICE: decadriver-web
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE \
            --region ${{ env.AWS_REGION }}
