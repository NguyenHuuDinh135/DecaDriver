name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"

env:
  AWS_REGION: us-west-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API URL from SSM
        id: api_url
        run: |
          ALB=$(aws ssm get-parameter --name /decadriver/prod/alb_dns_name --query Parameter.Value --output text 2>/dev/null || echo "${{ secrets.API_URL }}")
          echo "url=http://$ALB" >> $GITHUB_OUTPUT

      - run: bun install --frozen-lockfile

      - run: bun run build --filter=web
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.api_url.outputs.url }}

      - name: Sync to S3
        run: aws s3 sync apps/web/out s3://${{ secrets.S3_BUCKET }} --delete
