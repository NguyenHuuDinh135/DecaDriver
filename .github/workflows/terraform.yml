name: Terraform

on:
  workflow_dispatch: # Manual trigger only — auto-run disabled

env:
  TF_WORKING_DIR: infra/environments/prod
  TF_STATE_BUCKET: decadriver-tfstate
  TF_STATE_LOCK_TABLE: decadriver-tfstate-lock
  AWS_REGION: us-west-2

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap Terraform state backend
        run: |
          aws s3api head-bucket --bucket $TF_STATE_BUCKET 2>/dev/null || \
            aws s3 mb s3://$TF_STATE_BUCKET --region $AWS_REGION
          aws dynamodb describe-table --table-name $TF_STATE_LOCK_TABLE --region $AWS_REGION 2>/dev/null || \
            aws dynamodb create-table \
              --table-name $TF_STATE_LOCK_TABLE \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region $AWS_REGION

      - run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Import existing S3 web bucket if needed
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform state show aws_s3_bucket.web 2>/dev/null || \
            terraform import -var="bucket_name=${{ secrets.S3_BUCKET }}" aws_s3_bucket.web ${{ secrets.S3_BUCKET }} || true

      - run: terraform plan -var="bucket_name=${{ secrets.S3_BUCKET }}" -no-color -out=tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

  apply:
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - run: terraform apply tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Print outputs (set these as GitHub Secrets)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "ECR_REPOSITORY_URL=$(terraform output -raw ecr_repository_url)"
          echo "ECR_FASHN_IMAGE_URI=$(terraform output -raw ecr_fashn_image_uri)"
          echo "ECS_CLUSTER_NAME=$(terraform output -raw ecs_cluster_name)"
          echo "ECS_SERVICE_NAME=$(terraform output -raw ecs_service_name)"
          echo "AI_S3_BUCKET=$(terraform output -raw ai_s3_bucket)"
          echo "API_URL=$(terraform output -raw alb_dns_name)"
